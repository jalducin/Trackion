name: CI/CD

# Disciplina del proyecto (docs/ci-cd-standards.md):
#   - Pull Request → pruebas (compuerta de calidad, sin desplegar).
#   - Push a main  → pruebas + empaquetado + despliegue a AWS (a partir del 2.º push).
# Autenticación a AWS por OIDC (sin llaves de larga vida): rol trackion-github-actions.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  STAGE: develop
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::957266312835:role/trackion-github-actions

jobs:
  test:
    name: Pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements.txt -t vendor
      - name: Ejecutar pytest
        working-directory: backend
        run: python -m pytest -q

  deploy:
    name: Empaquetar y desplegar a AWS
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar Serverless Framework
        run: npm install -g serverless@3
      - name: Vendorizar dependencias
        working-directory: backend
        run: python -m pip install -r requirements.txt -t vendor
      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Validar empaquetado
        working-directory: backend
        run: serverless package --stage ${{ env.STAGE }}
      - name: Desplegar
        working-directory: backend
        run: serverless deploy --stage ${{ env.STAGE }}
