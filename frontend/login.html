<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackion — Acceso</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card metal-surface">
      <div class="brand">
        <div class="logo">T</div>
        <div>
          <h1>Trackion</h1>
          <div class="muted">Mesa de ayuda</div>
        </div>
      </div>
      <form id="loginForm">
        <label for="email">Correo</label>
        <input id="email" type="email" autocomplete="username" required placeholder="admin@trackion.local" />
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <div class="error" id="err"></div>
        <button class="btn accent full" type="submit" id="submitBtn" style="margin-top:16px">Iniciar sesión</button>
      </form>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem("trackion_token")) location.href = "index.html";
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const err = document.getElementById("err");
      err.textContent = "";
      btn.disabled = true; btn.textContent = "Entrando…";
      try {
        const data = await TrackionAPI.login(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        localStorage.setItem("trackion_token", data.token);
        localStorage.setItem("trackion_user", JSON.stringify(data.user));
        location.href = "index.html";
      } catch (ex) {
        err.textContent = ex.message || "No se pudo iniciar sesión";
      } finally {
        btn.disabled = false; btn.textContent = "Iniciar sesión";
      }
    });
  </script>
</body>
</html>
